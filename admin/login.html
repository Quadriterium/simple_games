<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #c8cad0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1a1b2e;
            border: 1px solid #2a2b3d;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
        }
        .login-card h1 {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e4e9;
            margin-bottom: 1.5rem;
            letter-spacing: -.02em;
        }
        .field { margin-bottom: 1rem; }
        .field label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: #8b8d97;
            margin-bottom: .35rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .field input {
            width: 100%;
            padding: .65rem .8rem;
            border: 1px solid #2a2b3d;
            border-radius: 8px;
            background: #12121f;
            color: #e2e4e9;
            font-size: .95rem;
            outline: none;
            transition: border-color .15s;
        }
        .field input:focus { border-color: #6366f1; }
        button[type="submit"] {
            width: 100%;
            padding: .7rem;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: #fff;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: .5rem;
            transition: background .15s;
        }
        button[type="submit"]:hover { background: #4f46e5; }
        button[type="submit"]:active { background: #4338ca; }
        .error-msg {
            margin-top: .8rem;
            padding: .6rem .8rem;
            border-radius: 8px;
            background: #2d1b1b;
            border: 1px solid #5c2626;
            color: #f87171;
            font-size: .85rem;
            text-align: center;
            display: none;
        }
        .error-msg.visible { display: block; }
    </style>
</head>
<body>
    <form class="login-card" id="login-form">
        <h1>Administration</h1>
        <div class="field">
            <label for="login-user">Identifiant</label>
            <input type="text" id="login-user" autocomplete="username" required autofocus>
        </div>
        <div class="field">
            <label for="login-pass">Mot de passe</label>
            <input type="password" id="login-pass" autocomplete="current-password" required>
        </div>
        <button type="submit">Connexion</button>
        <div class="error-msg" id="login-error"></div>
    </form>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('login-error');
            errEl.classList.remove('visible');
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Connexion...';
            try {
                const resp = await fetch('/api/admin/login', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('login-user').value,
                        password: document.getElementById('login-pass').value,
                    }),
                });
                const data = await resp.json();
                if (resp.ok) {
                    window.location.reload();
                } else {
                    errEl.textContent = data.error || 'Identifiants incorrects.';
                    errEl.classList.add('visible');
                }
            } catch {
                errEl.textContent = 'Erreur de connexion au serveur.';
                errEl.classList.add('visible');
            }
            btn.disabled = false;
            btn.textContent = 'Connexion';
        });
    </script>
</body>
</html>
