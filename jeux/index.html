<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jeux Classiques</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="landing.css">
</head>
<body>
    <div id="app">
        <a href="/" class="back-link">← Accueil</a>
        <h1 class="landing-title">👑 Jeux Classiques</h1>
        <p class="landing-subtitle">Choisis un jeu pour t'amuser !</p>

        <div class="exercise-grid">
            <a href="/jeux/couronnes" class="exercise-card">
                <span class="card-icon">👑</span>
                <span class="card-label">Couronnes</span>
                <span class="card-desc">Place les couronnes</span>
            </a>
            <a href="/jeux/sudoku" class="exercise-card">
                <span class="card-icon">🔢</span>
                <span class="card-label">Sudoku</span>
                <span class="card-desc">Remplis la grille</span>
            </a>
            <a href="/jeux/picross" class="exercise-card">
                <span class="card-icon">🖼️</span>
                <span class="card-label">Picross</span>
                <span class="card-desc">Révèle l'image cachée</span>
            </a>
        </div>
        <button id="force-refresh-btn" style="margin:30px auto 0;display:block;padding:8px 16px;border:1px solid #cbd5e0;border-radius:8px;background:#f7fafc;color:#718096;font-size:.8rem;cursor:pointer">🔄 Forcer la mise à jour</button>
    </div>
    <script>
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    document.getElementById('force-refresh-btn').addEventListener('click', async () => {
        const btn = document.getElementById('force-refresh-btn');
        btn.disabled = true;
        btn.textContent = '⏳ Mise à jour...';
        try {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
            const reg = await navigator.serviceWorker.getRegistration();
            if (reg) await reg.unregister();
        } catch {}
        location.reload(true);
    });
    </script>
</body>
</html>
