<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Jeux</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d69e2e">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="landing.css">
</head>
<body>
    <div id="app">
        <h1 class="landing-title">🎮 Mini Jeux</h1>
        <p class="landing-subtitle">Choisis une catégorie !</p>

        <div class="category-grid">
            <a href="/jeux/" class="category-card card-jeux">
                <span class="card-icon">👑</span>
                <span class="card-label">Jeux Classiques</span>
                <span class="card-desc">Couronnes, Sudoku, Picross</span>
            </a>
            <a href="/math/" class="category-card card-math">
                <span class="card-icon">🧮</span>
                <span class="card-label">Mathématiques</span>
                <span class="card-desc">Calcul, tables, divisions…</span>
            </a>
            <a href="/francais/" class="category-card card-francais">
                <span class="card-icon">📝</span>
                <span class="card-label">Français</span>
                <span class="card-desc">Conjugaison, orthographe, vocabulaire…</span>
            </a>
            <a href="/geographie/" class="category-card card-geo">
                <span class="card-icon">🗺️</span>
                <span class="card-label">Géographie</span>
                <span class="card-desc">Départements de France et continents</span>
            </a>
        </div>

        <button id="force-refresh-btn" style="margin:30px auto 0;display:block;padding:8px 16px;border:1px solid #cbd5e0;border-radius:8px;background:#f7fafc;color:#718096;font-size:.8rem;cursor:pointer">🔄 Forcer la mise à jour</button>
    </div>
    <script src="/auth-header.js"></script>
    <script>
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    document.getElementById('force-refresh-btn').addEventListener('click', async () => {
        const btn = document.getElementById('force-refresh-btn');
        btn.disabled = true;
        btn.textContent = '⏳ Mise à jour...';
        try {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
            const reg = await navigator.serviceWorker.getRegistration();
            if (reg) await reg.unregister();
        } catch {}
        location.reload(true);
    });

    // Preload all pages for offline use
    if ('caches' in window) {
        window.addEventListener('load', async () => {
            try {
                const reg = await navigator.serviceWorker.ready;
                // Once the SW is active, it will have cached everything on install.
                // But also trigger a fetch for all pages to make sure they're in cache.
                const pagesToCache = [
                    '/jeux/', '/jeux/couronnes/', '/jeux/sudoku/', '/jeux/picross/',
                    '/math/', '/math/multiplications/', '/math/additions/',
                    '/math/soustractions/', '/math/divisions/', '/math/divisions-posees/',
                    '/math/complements/', '/math/mixte/', '/math/comparaisons/',
                    '/francais/', '/francais/conjugaison/', '/francais/homophones/',
                    '/francais/pluriels/', '/francais/feminin-masculin/',
                    '/francais/vocabulaire/', '/francais/orthographe/',
                    '/geographie/', '/geographie/departements/', '/geographie/continents/',
                ];
                // Prefetch pages in background
                for (const url of pagesToCache) {
                    fetch(url).catch(() => {});
                }
            } catch {}
        });
    }
    </script>
</body>
</html>
